<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V&P · OKRs 2026</title>
<style>
  :root{
    --bg:#f5f1ea;
    --paper:#fbf8f2;
    --card:#ffffff;
    --ink:#0f5b49;
    --ink-2:#1d6d5a;
    --muted:#6c7b73;
    --line:#d8ddd5;
    --accent:#8bbb34;
    --accent-soft:#dce9b8;
    --header:#0d614c;
    --header-dark:#0a5240;
    --green:#76b041;
    --yellow:#f3c94a;
    --red:#d6412b;
    --shadow:0 10px 30px rgba(0,0,0,.05);
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Inter, Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:24px;
  }
  .container{max-width:1680px;margin:auto}

  .hero{
    background:linear-gradient(180deg, rgba(255,255,255,.70), rgba(255,255,255,.88));
    border:1px solid var(--line);
    border-radius:24px;
    padding:24px;
    margin-bottom:20px;
    box-shadow:var(--shadow);
  }
  .hero-top{
    display:grid;
    grid-template-columns:220px 1fr 260px;
    gap:18px;
    align-items:center;
  }
  .logo-wrap{display:flex;align-items:center;justify-content:flex-start}
  .logo-wrap img{
    width:150px;height:150px;object-fit:contain;
    filter: brightness(0) saturate(100%) invert(35%) sepia(54%) saturate(629%) hue-rotate(91deg) brightness(87%) contrast(88%);
  }
  .title-wrap{text-align:center}
  .eyebrow{font-size:20px;color:var(--ink-2);margin-bottom:4px}
  h1{
    margin:0;
    font-size:70px;
    line-height:.94;
    letter-spacing:-0.05em;
    color:var(--ink);
    font-weight:900;
  }
  .subtitle{margin-top:12px;font-size:18px;color:var(--muted)}
  .meta-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .tag{
    display:inline-flex;align-items:center;justify-content:center;
    padding:10px 14px;border:1px solid var(--line);border-radius:12px;
    background:#fff;color:var(--ink);font-size:13px;font-weight:800;
    box-shadow:0 4px 12px rgba(0,0,0,.04);
  }

  .legend{
    display:flex;gap:18px;justify-content:flex-end;align-items:center;
    margin-top:16px;flex-wrap:wrap;
  }
  .legend-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink)}
  .legend-pill{width:16px;height:16px;border-radius:50%}

  .board{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
    gap:18px;
    align-items:start;
  }
  .objective-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    overflow:hidden;
    box-shadow:var(--shadow);
    height:100%;
  }
  .objective-header{
    background:linear-gradient(180deg,var(--header),var(--header-dark));
    color:#fff;
    padding:18px 18px 16px;
    min-height:132px;
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:flex-start;
  }
  .focus{font-size:13px;letter-spacing:.08em;text-transform:uppercase;opacity:.9;font-weight:700}
  .objective-title{font-size:30px;font-weight:900;line-height:1.02;letter-spacing:-0.03em;margin-top:8px;max-width:90%}
  .objective-sub{margin-top:10px;font-size:13px;opacity:.85;line-height:1.45;max-width:90%}

  .score-badge{
    min-width:96px;
    text-align:center;
    padding:10px 12px;
    border-radius:14px;
    font-size:30px;
    font-weight:900;
    line-height:1;
    border:2px solid rgba(255,255,255,.28);
    background:#fff;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
  }
  .score-badge small{display:block;font-size:10px;letter-spacing:.10em;text-transform:uppercase;margin-top:6px;font-weight:800}
  .score-green{color:#3f7f22;background:#eef8df}
  .score-yellow{color:#a47500;background:#fff4cc}
  .score-red{color:#b12b1b;background:#fde1dd}

  .objective-body{padding:16px;background:linear-gradient(180deg,#fff,#fbf8f2)}
  .kr-card{
    background:#f9f6ef;
    border:1px solid #e7e0d3;
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
  }
  .kr-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .kr-name{font-size:22px;font-weight:900;line-height:1.05;color:var(--ink)}
  .kr-meta{margin-top:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .box{
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 10px 8px;
  }
  .box .label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
  .box .num{font-size:18px;font-weight:900;color:var(--ink);margin-top:4px}
  .formula{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.45}

  .kr-score{
    min-width:82px;
    text-align:center;
    padding:10px 10px;
    border-radius:12px;
    font-size:24px;
    font-weight:900;
    line-height:1;
    background:#fff;
    border:2px solid transparent;
  }
  .kr-score small{display:block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-top:6px;font-weight:800}

  @media (max-width:1100px){
    .hero-top{grid-template-columns:1fr;text-align:center}
    .logo-wrap,.meta-wrap{justify-content:center;align-items:center}
    .legend{justify-content:center}
    .objective-title,.objective-sub{max-width:100%}
  }
  @media (max-width:700px){
    h1{font-size:46px}
    .objective-title{font-size:24px}
    .kr-name{font-size:18px}
    .kr-meta{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-top">
      <div class="logo-wrap">
        <img src="logo-okrs.png" alt="Cultivamos futuro" />
      </div>
      <div class="title-wrap">
        <div class="eyebrow">V&P · OKRs 2026</div>
        <h1>ORGANIZACIONALES</h1>
        <div class="subtitle">Dashboard ejecutivo de objetivos y key results</div>
      </div>
      <div class="meta-wrap">
        <div class="tag" id="fecha"></div>
        <div class="tag" id="lastUpdate"></div>
        <div class="tag" id="dataDate"></div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="legend-pill" style="background:var(--green)"></span> Favorable</div>
      <div class="legend-item"><span class="legend-pill" style="background:var(--yellow)"></span> Atención</div>
      <div class="legend-item"><span class="legend-pill" style="background:var(--red)"></span> Presionado</div>
    </div>
  </div>

  <div id="okrs" class="board"></div>
</div>

<script>
const data=[
  {foco:'CALIDAD',objetivo:'Maximizar la captura de valor de la producción',descripcion:'Captura de valor comercial entregada al mercado.',krs:[
    {name:'IVC',actual:72,meta:85,formula:'IVC = % Exportable × % JBO o CAT 1+2 × % Arribos ≥ 4 × 100'}
  ]},
  {foco:'EFICIENCIA',objetivo:'Maximizar la eficiencia integral del negocio',descripcion:'Eficiencia productiva y cumplimiento de producción.',krs:[
    {name:'Breakeven/kg',actual:1.62,meta:1.45,formula:'Breakeven = Total egresos del P&L / Total kilos producidos'},
    {name:'ICP',actual:91,meta:95,formula:'ICP = Kg producidos / Kg programados × 100'}
  ]},
  {foco:'TALENTO',objetivo:'Maximizar la productividad de las personas',descripcion:'Productividad de personas y condiciones para su mejor desempeño.',krs:[
    {name:'IP',actual:78,meta:100,formula:'IP = % Kg cosechados por CAR / Total Kg cosechados × Costo Persona Target / Real × 100'}
  ]},
  {foco:'CRECIMIENTO ESTRATÉGICO',objetivo:'Maximizar la generación de nuevos flujos de negocios',descripcion:'Apertura y desarrollo de oportunidades de crecimiento.',krs:[
    {name:'INF',actual:9,meta:15,formula:'INF = (Contrib. orgánica + contrib. inorgánica) / Contrib. total grupo × 100'}
  ]}
];

function progress(a,m,name){
  if(name.toLowerCase().includes('breakeven')) return (m/a)*100;
  return (a/m)*100;
}
function band(p){
  if(p>=90) return 'green';
  if(p>=60) return 'yellow';
  return 'red';
}
function scoreClass(p){
  const b = band(p);
  return b === 'green' ? 'score-green' : b === 'yellow' ? 'score-yellow' : 'score-red';
}
function fmt(v){
  return Number.isInteger(v) ? v.toString() : v.toFixed(2);
}

function build(){
  const container=document.getElementById('okrs');
  container.innerHTML='';

  data.forEach(o=>{
    let worst=100;
    o.krs.forEach(k=>{
      const p=progress(k.actual,k.meta,k.name);
      if(p<worst) worst=p;
    });

    const objectiveCard=document.createElement('div');
    objectiveCard.className='objective-card';

    objectiveCard.innerHTML=`
      <div class="objective-header">
        <div>
          <div class="focus">${o.foco}</div>
          <div class="objective-title">${o.objetivo}</div>
          <div class="objective-sub">${o.descripcion}</div>
        </div>
        <div class="score-badge ${scoreClass(worst)}">${Math.round(worst)}<small>índice</small></div>
      </div>
      <div class="objective-body"></div>
    `;

    const body = objectiveCard.querySelector('.objective-body');

    o.krs.forEach(k=>{
      const p=progress(k.actual,k.meta,k.name);
      const kr=document.createElement('div');
      kr.className='kr-card';
      kr.innerHTML=`
        <div class="kr-top">
          <div>
            <div class="kr-name">${k.name}</div>
          </div>
          <div class="kr-score ${scoreClass(p)}">${Math.round(p)}<small>índice</small></div>
        </div>
        <div class="kr-meta">
          <div class="box">
            <div class="label">Actual</div>
            <div class="num">${fmt(k.actual)}</div>
          </div>
          <div class="box">
            <div class="label">Meta</div>
            <div class="num">${fmt(k.meta)}</div>
          </div>
          <div class="box">
            <div class="label">Avance</div>
            <div class="num">${p.toFixed(1)}%</div>
          </div>
        </div>
        <div class="formula">${k.formula}</div>
      `;
      body.appendChild(kr);
    });

    container.appendChild(objectiveCard);
  });
}

function semanaISO(d=new Date()){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=date.getUTCDay()||7;
  date.setUTCDate(date.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  const week=Math.ceil((((date-yearStart)/86400000)+1)/7);
  return week;
}

const hoy=new Date();
document.getElementById('fecha').textContent=`${hoy.toLocaleDateString('es-PE')} · Semana ${semanaISO(hoy)}`;
document.getElementById('lastUpdate').textContent=`Actualizado: ${hoy.toLocaleString('es-PE')}`;
const dataDate = new Date();
document.getElementById('dataDate').textContent=`Información al: ${dataDate.toLocaleDateString('es-PE')}`;

build();
</script>
</body>
</html>
