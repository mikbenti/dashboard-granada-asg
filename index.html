<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V&P · OKRs 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f0e8;
    --card:#fffdfa;
    --ink:#0d5c4a;
    --ink-2:#0b4f40;
    --muted:#6d7c73;
    --line:#d8ddd5;
    --header:#0d614c;
    --header-dark:#0a5240;
    --shadow:0 10px 28px rgba(0,0,0,.06);
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:'Montserrat', Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:24px;
  }
  .container{max-width:1720px;margin:auto}
  .hero{
    background:linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,.9));
    border:1px solid var(--line);
    border-radius:24px;
    padding:24px;
    margin-bottom:20px;
    box-shadow:var(--shadow);
  }
  .hero-top{display:grid;grid-template-columns:220px 1fr 260px;gap:18px;align-items:center}
  .logo-wrap{display:flex;align-items:center;justify-content:flex-start}
  .logo-wrap > img{width:150px;height:150px;object-fit:contain;filter: brightness(0) saturate(100%) invert(47%) sepia(55%) saturate(536%) hue-rotate(49deg) brightness(95%) contrast(89%)}
  .title-wrap{text-align:center}
  .eyebrow{font-size:20px;color:var(--ink-2);margin-bottom:4px;font-weight:500}
  h1{margin:0;font-size:48px;line-height:1;letter-spacing:-0.03em;color:var(--ink);font-weight:800;text-transform:uppercase}
  .subtitle{margin-top:12px;font-size:17px;color:var(--muted);font-weight:500}
  .meta-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .tag{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:12px 16px;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--ink);box-shadow:0 4px 12px rgba(0,0,0,.04);min-width:250px}
  .tag-label{font-size:14px;font-weight:500;color:var(--ink);line-height:1.1}
  .tag-date{font-size:16px;font-weight:800;color:var(--ink);line-height:1.2;margin-top:6px}
  .legend{display:flex;justify-content:flex-end;align-items:center;gap:14px;margin-top:14px}
  .legend-chip{width:38px;height:26px;border-radius:12px;display:inline-block}
  .score-green{color:#103f0d;background:#57ff1f;border:3px solid #1f5e10}
  .score-yellow{color:#7a5a00;background:#fff200;border:3px solid #a67c00}
  .score-red{color:#5a0b0f;background:#ff3b30;border:3px solid #7a0f14}

  .dashboard-section{margin-bottom:24px}
  .section-banner{
    max-width:380px;display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:14px;padding:14px 18px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.75);box-shadow:var(--shadow)}
  .section-left{display:flex;align-items:center;gap:18px}
  .section-left img{height:90px;width:auto;object-fit:contain}
  .section-left img.blueberry-icon{height:90px;width:auto;transform:scale(2);transform-origin:left center}
  .section-title{font-size:0;line-height:0}
  .section-product{font-size:18px;color:var(--muted);font-weight:600;text-align:right;white-space:nowrap}

  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:18px;align-items:start}
  .objective-card{background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:var(--shadow);height:100%}
  .objective-header{background:linear-gradient(180deg,var(--header),var(--header-dark));color:#fff;padding:18px 18px 16px;min-height:132px;display:block}
  .focus{font-size:18px;letter-spacing:.08em;text-transform:uppercase;opacity:.98;font-weight:800;text-align:center;display:block}
  .objective-title{font-size:20px;font-weight:700;text-transform:uppercase;line-height:1.1;letter-spacing:0.02em;margin-top:10px;max-width:100%;color:#ffffff;text-align:center}
  .objective-sub{margin-top:12px;font-size:11px;opacity:.9;line-height:1.45;max-width:100%;font-weight:400;text-align:center}

  .subscore,.component-score{text-align:center;line-height:1;border-radius:14px;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.35)}
  .subscore{min-width:82px;padding:10px 10px;font-size:24px}
  .component-score{min-width:48px;padding:5px 6px;border-radius:10px;font-size:14px}
  .subscore small,.component-score small{display:block;text-transform:uppercase;font-weight:800}
  .subscore small{font-size:10px;letter-spacing:.10em;margin-top:6px}
  .component-score small{font-size:7px;letter-spacing:.06em;margin-top:3px}

  .objective-body{padding:16px;background:linear-gradient(180deg,#fff,#fbf8f2)}
  .kr-shell{background:#f9f6ef;border:1px solid #e7e0d3;border-radius:16px;padding:14px;margin-bottom:12px}
  .kr-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
  .kr-name{font-size:22px;font-weight:900;line-height:1.05;color:var(--ink)}
  .kr-note{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.45;font-weight:500}
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .box{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 10px 8px}
  .box .label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
  .box .num{font-size:18px;font-weight:900;color:var(--ink);margin-top:4px}

  details.kr-details{margin-top:10px}
  details.kr-details summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid #d8ddd5;border-radius:12px;background:#ffffff;font-weight:800;color:var(--ink)}
  details.kr-details summary::-webkit-details-marker{display:none}
  .summary-right{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:700}
  .chev{transition:transform .2s ease}
  details[open] .chev{transform:rotate(180deg)}
  .details-body{padding-top:10px}
  .component-grid{display:grid;grid-template-columns:1fr;gap:8px}
  .component-row{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .component-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .component-title{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:800;line-height:1.3}
  .component-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
  .component-mini{background:#faf8f3;border:1px solid var(--line);border-radius:8px;padding:6px 8px}
  .component-mini .mini-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:800}
  .component-mini .mini-num{font-size:13px;font-weight:800;color:var(--ink);margin-top:3px}

  @media (max-width:1200px){
    .hero-top{grid-template-columns:1fr;text-align:center}
    .logo-wrap,.meta-wrap{justify-content:center;align-items:center}
    .legend{justify-content:center}
    .tag{align-items:center}
  }
  @media (max-width:700px){
    h1{font-size:38px}
    .objective-title{font-size:18px}
    .kr-name{font-size:18px}
    .summary-grid,.component-metrics{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-top">
      <div class="logo-wrap"><img src="logo-okrs.png" alt="Cultivamos futuro"></div>
      <div class="title-wrap">
        <div class="eyebrow">Valle y Pampa · 2026</div>
        <h1>Dashboard Indicadores Estratégicos</h1>
        <div class="subtitle">Monitoreo de objetivos y resultados clave</div>
      </div>
      <div class="meta-wrap">
        <div class="tag">
          <div class="tag-label">Ultima Actualización</div>
          <div class="tag-date" id="fecha"></div>
        </div>
      </div>
    </div>
    <div class="legend">
      <span class="legend-chip score-green"></span>
      <span class="legend-chip score-yellow"></span>
      <span class="legend-chip score-red"></span>
    </div>
  </div>

  <div id="sections"></div>
</div>

<script>
const sections = [
  {
    title:'Agrícola San Gallán (ASG)',
    icon:'logo-asg.png',
    iconClass:'',
    subtitle:'granada',
    objectives:[
      {
        foco:'CALIDAD',
        objetivo:'Maximizar la captura de valor de la producción',
        descripcion:'Captura de valor comercial entregada al mercado.',
        krs:[
          {
            name:'IVC',
            note:'Índice de valor comercializable para granada.',
            actual:52.94,
            meta:59.82,
            components:[
              {label:'% Exportable', actual:81, meta:78.2, comparison:'+2.8 pp'},
              {label:'% CAT 1 + 2 s/exportable', actual:79, meta:90, comparison:'-11.0 pp'},
              {label:'% Arribos ≥ 4', actual:88, meta:85, comparison:'+3.0 pp'}
            ],
            comparison:'-6.88 | -11.5%'
          }
        ]
      },
      {
        foco:'EFICIENCIA',
        objetivo:'Maximizar la eficiencia integral del negocio',
        descripcion:'Eficiencia productiva y cumplimiento de producción.',
        krs:[
          {
            name:'Breakeven/kg',
            note:'Costo de equilibrio por kg en ASG.',
            actual:1.28,
            meta:1.18,
            lowerIsBetter:true,
            components:[
              {label:'Egresos P&L', actual:'US$ 7.9MM', meta:'US$ 7.4MM', comparison:'+0.5MM'},
              {label:'Kg producidos', actual:'6.17MM', meta:'6.63MM', comparison:'-0.46MM'},
              {label:'Breakeven', actual:1.28, meta:1.18, comparison:'+0.10', lowerIsBetter:true}
            ],
            comparison:'1.28 | +8%'
          },
          {
            name:'ICP',
            note:'Cumplimiento de producción de granada.',
            actual:93,
            meta:95,
            components:[
              {label:'Kg producidos vs programa', actual:93, meta:95, comparison:'-2 pp', isICP:true}
            ],
            comparison:'93% | -2 pp'
          }
        ]
      },
      {
        foco:'TALENTO',
        objetivo:'Maximizar la productividad de las personas',
        descripcion:'Productividad de personas y condiciones para su mejor desempeño.',
        krs:[
          {
            name:'IP',
            note:'Índice de productividad en ASG.',
            actual:76,
            meta:100,
            components:[
              {label:'% Kg por CAR', actual:82, meta:90, comparison:'-8 pts'},
              {label:'Costo persona', actual:0.93, meta:1.00, comparison:'-0.07', lowerIsBetter:true}
            ],
            comparison:'76 | -24%'
          }
        ]
      }
    ]
  },
  {
    title:'Family Farms Perú (FFP)',
    icon:'logo-family.png',
    iconClass:'blueberry-icon',
    subtitle:'arándano',
    objectives:[
      {
        foco:'CALIDAD',
        objetivo:'Maximizar la captura de valor de la producción',
        descripcion:'Captura de valor comercial entregada al mercado.',
        krs:[
          {
            name:'IVC',
            note:'Índice de valor comercializable para arándanos.',
            actual:35.95,
            meta:41.65,
            components:[
              {label:'% Exportable', actual:84, meta:85, comparison:'-1.0 pp'},
              {label:'% JBO s/total producido', actual:48, meta:30, comparison:'+18.0 pp'},
              {label:'% Arribos ≥ 4', actual:89, meta:70, comparison:'+19.0 pp'}
            ],
            comparison:'-5.70 | -13.7%'
          }
        ]
      },
      {
        foco:'EFICIENCIA',
        objetivo:'Maximizar la eficiencia integral del negocio',
        descripcion:'Eficiencia productiva y cumplimiento de producción.',
        krs:[
          {
            name:'Breakeven/kg',
            note:'Costo de equilibrio por kg en FFP.',
            actual:1.62,
            meta:1.45,
            lowerIsBetter:true,
            components:[
              {label:'Egresos P&L', actual:'US$ 16.2MM', meta:'US$ 15.6MM', comparison:'+0.6MM'},
              {label:'Kg producidos', actual:'9.95MM', meta:'10.93MM', comparison:'-0.98MM'},
              {label:'Breakeven', actual:1.62, meta:1.45, comparison:'+0.17', lowerIsBetter:true}
            ],
            comparison:'1.62 | +12%'
          },
          {
            name:'ICP',
            note:'Cumplimiento de producción de arándanos.',
            actual:91,
            meta:95,
            components:[
              {label:'Kg producidos vs programa', actual:91, meta:95, comparison:'-4 pp', isICP:true}
            ],
            comparison:'91% | -4 pp'
          }
        ]
      },
      {
        foco:'TALENTO',
        objetivo:'Maximizar la productividad de las personas',
        descripcion:'Productividad de personas y condiciones para su mejor desempeño.',
        krs:[
          {
            name:'IP',
            note:'Índice de productividad en FFP.',
            actual:81,
            meta:100,
            components:[
              {label:'% Kg por CAR', actual:86, meta:92, comparison:'-6 pts'},
              {label:'Costo persona', actual:0.94, meta:1.00, comparison:'-0.06', lowerIsBetter:true}
            ],
            comparison:'81 | -19%'
          }
        ]
      }
    ]
  },
  {
    title:'Nuevos Flujos de Negocios',
    icon:'logo-okrs.png',
    iconClass:'',
    subtitle:'',
    objectives:[
      {
        foco:'CRECIMIENTO ESTRATÉGICO',
        objetivo:'Maximizar la generación de nuevos flujos de negocios',
        descripcion:'Apertura y desarrollo de oportunidades de crecimiento.',
        krs:[
          {
            name:'INF',
            note:'Indicador consolidado que representa a ambos negocios.',
            actual:9,
            meta:15,
            components:[
              {label:'Contrib. orgánica', actual:4.5, meta:7.5, comparison:'-3.0 pts'},
              {label:'Contrib. inorgánica', actual:4.5, meta:7.5, comparison:'-3.0 pts'}
            ],
            comparison:'9 | -40%'
          }
        ]
      }
    ]
  }
];

function progress(actual, meta, name, lowerIsBetter=false){
  if (typeof actual !== 'number' || typeof meta !== 'number') return 0;
  if (lowerIsBetter || String(name).toLowerCase().includes('breakeven')) return actual > 0 ? (meta / actual) * 100 : 0;
  return meta > 0 ? (actual / meta) * 100 : 0;
}
function band(name, actual, meta, lowerIsBetter=false){
  const n = String(name).toLowerCase();
  if (n.includes('icp')) {
    if (actual >= 95) return 'green';
    if (actual >= 90) return 'yellow';
    return 'red';
  }
  if (n.includes('ivc')) {
    const deviationPct = meta > 0 ? ((actual - meta) / meta) * 100 : 0;
    if (deviationPct >= -5) return 'green';
    if (deviationPct >= -10) return 'yellow';
    return 'red';
  }
  const p = progress(actual, meta, name, lowerIsBetter);
  if (p >= 90) return 'green';
  if (p >= 60) return 'yellow';
  return 'red';
}
function scoreClass(name, actual, meta, lowerIsBetter=false){
  const b = band(name, actual, meta, lowerIsBetter);
  return b === 'green' ? 'score-green' : b === 'yellow' ? 'score-yellow' : 'score-red';
}
function fmt(v){
  if (typeof v === 'string') return v;
  return Number.isInteger(v) ? v.toString() : v.toFixed(2);
}
function componentIndex(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return '—';
  return Math.round(progress(c.actual, c.meta, c.label, !!c.lowerIsBetter)) + '%';
}
function componentBandValue(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return 'yellow';
  return band(c.label, c.actual, c.meta, !!c.lowerIsBetter);
}
function componentScoreClass(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return 'score-yellow';
  return scoreClass(c.label, c.actual, c.meta, !!c.lowerIsBetter);
}
function componentProgressValue(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return null;
  return progress(c.actual, c.meta, c.label, !!c.lowerIsBetter);
}
function krComputedProgress(k){
  if (String(k.name).toLowerCase().includes('ivc')) {
    const vals = (k.components || []).map(componentProgressValue).filter(v => typeof v === 'number' && !Number.isNaN(v));
    if (vals.length) return vals.reduce((a,b)=>a+b,0) / vals.length;
  }
  const numericComponents = (k.components || []).filter(c => typeof c.actual === 'number' && typeof c.meta === 'number');
  if (numericComponents.length > 0) {
    const vals = numericComponents.map(componentProgressValue).filter(v => typeof v === 'number' && !Number.isNaN(v));
    if (vals.length > 0) return vals.reduce((a,b)=>a+b,0) / vals.length;
  }
  return progress(k.actual, k.meta, k.name, !!k.lowerIsBetter);
}
function krComputedBand(k){
  if (String(k.name).toLowerCase().includes('ivc')) return band(k.name, k.actual, k.meta, !!k.lowerIsBetter);
  const numericComponents = (k.components || []).filter(c => typeof c.actual === 'number' && typeof c.meta === 'number');
  if (numericComponents.length > 0) {
    const bands = numericComponents.map(componentBandValue);
    if (bands.includes('red')) return 'red';
    if (bands.includes('yellow')) return 'yellow';
    return 'green';
  }
  return band(k.name, k.actual, k.meta, !!k.lowerIsBetter);
}
function krComputedScoreClass(k){
  const b = krComputedBand(k);
  return b === 'green' ? 'score-green' : b === 'yellow' ? 'score-yellow' : 'score-red';
}

function build(){
  const sectionsWrap = document.getElementById('sections');
  sectionsWrap.innerHTML = '';
  sections.forEach(section => {
    const fruitImg = section.subtitle ? `<img src="${section.subtitle === 'granada' ? 'granada.png' : 'arandano.png'}" style="height:72px;width:auto;object-fit:contain;"/>` : '';
    const sec = document.createElement('div');
    sec.className = 'dashboard-section';
    sec.innerHTML = `
      <div class="section-banner">
        <div class="section-left">
          <img class="${section.iconClass}" src="${section.icon}" alt="${section.title}" />
          <div><div class="section-title">${section.title}</div></div>
        </div>
        <div class="section-product">${fruitImg}</div>
      </div>
      <div class="board"></div>
    `;
    const board = sec.querySelector('.board');

    section.objectives.forEach(o => {
      const objectiveCard=document.createElement('div');
      objectiveCard.className='objective-card';
      objectiveCard.innerHTML=`
        <div class="objective-header">
          <div class="focus">${o.foco}</div>
          <div class="objective-title">${o.objetivo}</div>
          <div class="objective-sub">${o.descripcion}</div>
        </div>
        <div class="objective-body"></div>
      `;
      const body = objectiveCard.querySelector('.objective-body');

      o.krs.forEach(k => {
        const p = krComputedProgress(k);
        const colorClass = krComputedScoreClass(k);
        const shell = document.createElement('div');
        shell.className = 'kr-shell';
        shell.innerHTML = `
          <div class="kr-head">
            <div>
              <div class="kr-name">${k.name}</div>
              <div class="kr-note">${k.note}</div>
            </div>
            <div class="subscore ${colorClass}">${Math.round(p)}%<small>cumpl.</small></div>
          </div>
          <div class="summary-grid">
            <div class="box">
              <div class="label">Meta</div>
              <div class="num">${k.name.toLowerCase().includes('icp') ? '≥95%' : fmt(k.meta)}</div>
            </div>
            <div class="box">
              <div class="label">Real</div>
              <div class="num">${fmt(k.actual)}${k.name.toLowerCase().includes('icp') ? '%' : ''}</div>
            </div>
            <div class="box">
              <div class="label">Comparación</div>
              <div class="num">${k.comparison}</div>
            </div>
          </div>
          <details class="kr-details">
            <summary>
              <span>Ver detalle</span>
              <span class="summary-right">Componentes <span class="chev">⌄</span></span>
            </summary>
            <div class="details-body">
              <div class="component-grid">
                ${k.components.map(c => `
                  <div class="component-row">
                    <div class="component-top">
                      <div class="component-title">${c.label}</div>
                      <div class="component-score ${componentScoreClass(c)}">${componentIndex(c)}<small>cumpl.</small></div>
                    </div>
                    <div class="component-metrics">
                      <div class="component-mini">
                        <div class="mini-label">Meta</div>
                        <div class="mini-num">${fmt(c.meta ?? '—')}${c.isICP ? '%' : ''}</div>
                      </div>
                      <div class="component-mini">
                        <div class="mini-label">Real</div>
                        <div class="mini-num">${fmt(c.actual ?? '—')}${c.isICP ? '%' : ''}</div>
                      </div>
                      <div class="component-mini">
                        <div class="mini-label">Comparación</div>
                        <div class="mini-num">${c.comparison ?? '—'}</div>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </details>
        `;
        body.appendChild(shell);
      });

      board.appendChild(objectiveCard);
    });

    sectionsWrap.appendChild(sec);
  });
}

function semanaISO(d=new Date()){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=date.getUTCDay()||7;
  date.setUTCDate(date.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}
const hoy = new Date();
document.getElementById('fecha').textContent = `${hoy.toLocaleDateString('es-PE')} | Semana ${semanaISO(hoy)}`;
build();
</script>
</body>
</html>
