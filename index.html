<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V&P · OKRs 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f0e8;
    --card:#fffdfa;
    --ink:#0d5c4a;
    --ink-2:#0b4f40;
    --muted:#6d7c73;
    --line:#d8ddd5;
    --header:#0d614c;
    --header-dark:#0a5240;
    --shadow:0 10px 28px rgba(0,0,0,.06);
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:'Montserrat', Arial, sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:24px;
  }
  .container{max-width:1720px;margin:auto}

  .hero{
    background:linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,.9));
    border:1px solid var(--line);
    border-radius:24px;
    padding:24px;
    margin-bottom:20px;
    box-shadow:var(--shadow);
  }
  .hero-top{
    display:grid;
    grid-template-columns:220px 1fr 220px;
    gap:18px;
    align-items:center;
  }
  .logo-wrap{display:flex;align-items:center;justify-content:flex-start}
  .logo-wrap > img{
    width:150px;height:150px;object-fit:contain;
    filter: brightness(0) saturate(100%) invert(47%) sepia(55%) saturate(536%) hue-rotate(49deg) brightness(95%) contrast(89%);
  }
  .title-wrap{text-align:center}
  .eyebrow{font-size:20px;color:var(--ink-2);margin-bottom:4px;font-weight:500}
  h1{margin:0;font-size:48px;line-height:1;letter-spacing:-0.03em;color:var(--ink);font-weight:800;text-transform:uppercase}
  .subtitle{margin-top:12px;font-size:17px;color:var(--muted);font-weight:500}
  .meta-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .tag{
    display:inline-flex;align-items:center;justify-content:center;
    padding:10px 14px;border:1px solid var(--line);border-radius:12px;
    background:#fff;color:var(--ink);font-size:13px;font-weight:800;
    box-shadow:0 4px 12px rgba(0,0,0,.04);
  }

  .legend{display:flex;gap:18px;justify-content:flex-end;align-items:center;margin-top:16px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink)}
  .legend-chip{padding:7px 10px;border-radius:10px;font-size:13px;font-weight:900;border:1px solid rgba(0,0,0,.06)}
  .score-green{color:#103f0d;background:#57ff1f;border:2px solid #1f5e10}
  .score-yellow{color:#7a5600;background:#fff200;border:2px solid #a06f00}
  .score-red{color:#6e0f1b;background:#ff4a3d;border:2px solid #76111e}

  .dashboard-section{margin-bottom:24px}
  .section-banner{
    display:flex;justify-content:space-between;align-items:center;gap:16px;
    margin-bottom:14px;padding:14px 18px;border:1px solid var(--line);
    border-radius:18px;background:rgba(255,255,255,.75);box-shadow:var(--shadow)
  }
  .section-left{display:flex;align-items:center;gap:14px}
  .section-left img{width:54px;height:54px;object-fit:contain}
  .section-left img.blueberry-icon{width:95px;height:95px}
  .section-title{font-size:30px;font-weight:900;letter-spacing:-0.03em;color:var(--ink)}
  .section-sub{font-size:13px;color:var(--muted);margin-top:4px;font-weight:600}
  .section-company-logo{height:34px;width:auto;object-fit:contain;background:transparent;opacity:1;display:block}
  .section-company-logo.asg{filter: brightness(0) saturate(100%) invert(27%) sepia(44%) saturate(863%) hue-rotate(126deg) brightness(91%) contrast(93%)}
  .section-company-logo.family{filter:none;opacity:1}

  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:18px;align-items:start}
  .objective-card{background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:var(--shadow);height:100%}
  .objective-header{
    background:linear-gradient(180deg,var(--header),var(--header-dark));
    color:#fff;padding:18px 18px 16px;min-height:132px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start
  }
  .focus{font-size:13px;letter-spacing:.08em;text-transform:uppercase;opacity:.92;font-weight:700}
  .objective-title{
    font-size:20px;
    font-weight:700;
    text-transform:uppercase;
    line-height:1.1;
    letter-spacing:0.02em;
    margin-top:8px;
    max-width:92%;
    color:#ffffff;
  }
  .objective-sub{margin-top:10px;font-size:13px;opacity:.88;line-height:1.45;max-width:92%;font-weight:500}

  .score-badge,.subscore{
    text-align:center;
    background:#fff;
    line-height:1;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
  }
  .score-badge{min-width:98px;padding:10px 12px;border-radius:14px;font-size:30px;font-weight:900;border-color:rgba(255,255,255,.22)}
  .subscore{min-width:82px;padding:10px 10px;border-radius:12px;font-size:24px;font-weight:900}
  .score-badge small,.subscore small{display:block;font-size:10px;letter-spacing:.10em;text-transform:uppercase;margin-top:6px;font-weight:800}

  .objective-body{padding:16px;background:linear-gradient(180deg,#fff,#fbf8f2)}
  .kr-shell{background:#f9f6ef;border:1px solid #e7e0d3;border-radius:16px;padding:14px;margin-bottom:12px}
  .kr-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
  .kr-name{font-size:22px;font-weight:900;line-height:1.05;color:var(--ink)}
  .kr-note{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.45;font-weight:500}

  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .box,.component-box{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 10px 8px}
  .box .label,.component-box .label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
  .box .num,.component-box .num{font-size:18px;font-weight:900;color:var(--ink);margin-top:4px}

  details.kr-details{margin-top:10px}
  details.kr-details summary{
    list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;border:1px solid #d8ddd5;border-radius:12px;background:#ffffff;font-weight:800;color:var(--ink)
  }
  details.kr-details summary::-webkit-details-marker{display:none}
  .summary-right{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:700}
  .chev{transition:transform .2s ease}
  details[open] .chev{transform:rotate(180deg)}
  .details-body{padding-top:10px}
  .component-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

  @media (max-width:1200px){
    .hero-top{grid-template-columns:1fr;text-align:center}
    .logo-wrap,.meta-wrap{justify-content:center;align-items:center}
    .legend{justify-content:center}
    .objective-title,.objective-sub{max-width:100%}
  }
  @media (max-width:700px){
    h1{font-size:38px}
    .objective-title{font-size:18px}
    .kr-name{font-size:18px}
    .summary-grid,.component-grid{grid-template-columns:1fr}
    .section-title{font-size:24px}
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-top">
      <div class="logo-wrap">
        <img src="logo-okrs.png" alt="Cultivamos futuro">
      </div>
      <div class="title-wrap">
        <div class="eyebrow">Valle y Pampa · 2026</div>
        <h1>Dashboard Indicadores Estratégicos</h1>
        <div class="subtitle">Monitoreo de objetivos y resultados clave</div>
      </div>
      <div class="meta-wrap">
        <div class="tag" id="fecha"></div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="legend-chip score-green">90+</span></div>
      <div class="legend-item"><span class="legend-chip score-yellow">60-89</span></div>
      <div class="legend-item"><span class="legend-chip score-red">&lt;60</span></div>
    </div>
  </div>

  <div id="sections"></div>
</div>

<script>
const sections = [
  {
    title:'Granada',
    icon:'granada.png',
    iconClass:'',
    subtitle:'Agrícola San Gallán (ASG)',
    companyLogo:'logo-asg.png',
    companyClass:'asg',
    objectives:[
      {
        foco:'CALIDAD',
        objetivo:'Maximizar la captura de valor de la producción',
        descripcion:'Captura de valor comercial entregada al mercado.',
        krs:[
          {
            name:'IVC',
            note:'Índice de valor comercializable para granada.',
            actual:69,
            meta:82,
            components:[
              {label:'% Exportable', value:'81%'},
              {label:'% CAT 1 + 2', value:'79%'},
              {label:'% Arribos ≥ 4', value:'88%'}
            ],
            comparison:'-13 pts vs meta'
          }
        ]
      },
      {
        foco:'EFICIENCIA',
        objetivo:'Maximizar la eficiencia integral del negocio',
        descripcion:'Eficiencia productiva y cumplimiento de producción.',
        krs:[
          {
            name:'Breakeven/kg',
            note:'Costo de equilibrio por kg en ASG.',
            actual:1.28,
            meta:1.18,
            lowerIsBetter:true,
            components:[
              {label:'Egresos P&L', value:'US$ 7.9MM'},
              {label:'Kg producidos', value:'6.17MM'},
              {label:'Breakeven', value:'US$ 1.28'}
            ],
            comparison:'+0.10 vs meta'
          },
          {
            name:'ICP',
            note:'Cumplimiento de producción de granada.',
            actual:93,
            meta:95,
            components:[
              {label:'Kg producidos', value:'6.17MM'},
              {label:'Kg programados', value:'6.63MM'},
              {label:'ICP', value:'93%'}
            ],
            comparison:'-2 pts vs meta'
          }
        ]
      },
      {
        foco:'TALENTO',
        objetivo:'Maximizar la productividad de las personas',
        descripcion:'Productividad de personas y condiciones para su mejor desempeño.',
        krs:[
          {
            name:'IP',
            note:'Índice de productividad en ASG.',
            actual:76,
            meta:100,
            components:[
              {label:'% Kg por CAR', value:'82%'},
              {label:'Costo target/real', value:'0.93x'},
              {label:'IP', value:'76'}
            ],
            comparison:'-24 pts vs meta'
          }
        ]
      }
    ]
  },
  {
    title:'Arándano',
    icon:'arandano.png',
    iconClass:'blueberry-icon',
    subtitle:'Family Farms Perú (FFP)',
    companyLogo:'logo-family.png',
    companyClass:'family',
    objectives:[
      {
        foco:'CALIDAD',
        objetivo:'Maximizar la captura de valor de la producción',
        descripcion:'Captura de valor comercial entregada al mercado.',
        krs:[
          {
            name:'IVC',
            note:'Índice de valor comercializable para arándanos.',
            actual:74,
            meta:85,
            components:[
              {label:'% Exportable', value:'84%'},
              {label:'% JBO Exportable', value:'48%'},
              {label:'% Arribos ≥ 4', value:'89%'}
            ],
            comparison:'-11 pts vs meta'
          }
        ]
      },
      {
        foco:'EFICIENCIA',
        objetivo:'Maximizar la eficiencia integral del negocio',
        descripcion:'Eficiencia productiva y cumplimiento de producción.',
        krs:[
          {
            name:'Breakeven/kg',
            note:'Costo de equilibrio por kg en FFP.',
            actual:1.62,
            meta:1.45,
            lowerIsBetter:true,
            components:[
              {label:'Egresos P&L', value:'US$ 16.2MM'},
              {label:'Kg producidos', value:'9.95MM'},
              {label:'Breakeven', value:'US$ 1.62'}
            ],
            comparison:'+0.17 vs meta'
          },
          {
            name:'ICP',
            note:'Cumplimiento de producción de arándanos.',
            actual:91,
            meta:95,
            components:[
              {label:'Kg producidos', value:'9.95MM'},
              {label:'Kg programados', value:'10.93MM'},
              {label:'ICP', value:'91%'}
            ],
            comparison:'-4 pts vs meta'
          }
        ]
      },
      {
        foco:'TALENTO',
        objetivo:'Maximizar la productividad de las personas',
        descripcion:'Productividad de personas y condiciones para su mejor desempeño.',
        krs:[
          {
            name:'IP',
            note:'Índice de productividad en FFP.',
            actual:81,
            meta:100,
            components:[
              {label:'% Kg por CAR', value:'86%'},
              {label:'Costo target/real', value:'0.94x'},
              {label:'IP', value:'81'}
            ],
            comparison:'-19 pts vs meta'
          }
        ]
      }
    ]
  },
  {
    title:'Nuevos Flujos de Negocios',
    icon:'logo-okrs.png',
    iconClass:'',
    subtitle:'Índice consolidado',
    companyLogo:'',
    companyClass:'',
    objectives:[
      {
        foco:'CRECIMIENTO ESTRATÉGICO',
        objetivo:'Maximizar la generación de nuevos flujos de negocios',
        descripcion:'Apertura y desarrollo de oportunidades de crecimiento.',
        krs:[
          {
            name:'INF',
            note:'Indicador consolidado que representa a ambos negocios.',
            actual:9,
            meta:15,
            components:[
              {label:'Contrib. orgánica', value:'4.5%'},
              {label:'Contrib. inorgánica', value:'4.5%'},
              {label:'Contrib. total grupo', value:'100%'}
            ],
            comparison:'-6 pts vs meta'
          }
        ]
      }
    ]
  }
];

function progress(actual, meta, name, lowerIsBetter=false){
  if (lowerIsBetter || String(name).toLowerCase().includes('breakeven')) {
    return actual > 0 ? (meta / actual) * 100 : 0;
  }
  return meta > 0 ? (actual / meta) * 100 : 0;
}

function band(name, actual, meta, lowerIsBetter=false){
  const n = String(name).toLowerCase();
  if (n.includes('icp')) {
    if (actual >= 95) return 'green';
    if (actual >= 90) return 'yellow';
    return 'red';
  }
  const p = progress(actual, meta, name, lowerIsBetter);
  if (p >= 90) return 'green';
  if (p >= 60) return 'yellow';
  return 'red';
}

function scoreClass(name, actual, meta, lowerIsBetter=false){
  const b = band(name, actual, meta, lowerIsBetter);
  return b === 'green' ? 'score-green' : b === 'yellow' ? 'score-yellow' : 'score-red';
}

function fmt(v){
  return Number.isInteger(v) ? v.toString() : v.toFixed(2);
}

function build(){
  const sectionsWrap = document.getElementById('sections');
  sectionsWrap.innerHTML = '';

  sections.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'dashboard-section';

    sec.innerHTML = `
      <div class="section-banner">
        <div class="section-left">
          <img class="${section.iconClass}" src="${section.icon}" alt="${section.title}" />
          <div>
            <div class="section-title">${section.title}</div>
            <div class="section-sub">${section.subtitle}</div>
          </div>
        </div>
        ${section.companyLogo ? `<img class="section-company-logo ${section.companyClass || ''}" src="${section.companyLogo}" alt="${section.subtitle}" />` : `<div></div>`}
      </div>
      <div class="board"></div>
    `;

    const board = sec.querySelector('.board');

    section.objectives.forEach(o => {
      const objectiveBands = o.krs.map(k => band(k.name, k.actual, k.meta, !!k.lowerIsBetter));
      const objectiveColor = objectiveBands.includes('red') ? 'score-red' : objectiveBands.includes('yellow') ? 'score-yellow' : 'score-green';
      const objectiveIndex = Math.min(...o.krs.map(k => progress(k.actual, k.meta, k.name, !!k.lowerIsBetter)));

      const objectiveCard=document.createElement('div');
      objectiveCard.className='objective-card';
      objectiveCard.innerHTML=`
        <div class="objective-header">
          <div>
            <div class="focus">${o.foco}</div>
            <div class="objective-title">${o.objetivo}</div>
            <div class="objective-sub">${o.descripcion}</div>
          </div>
          <div class="score-badge ${objectiveColor}">${Math.round(objectiveIndex)}<small>índice</small></div>
        </div>
        <div class="objective-body"></div>
      `;

      const body = objectiveCard.querySelector('.objective-body');

      o.krs.forEach(k => {
        const p = progress(k.actual, k.meta, k.name, !!k.lowerIsBetter);
        const colorClass = scoreClass(k.name, k.actual, k.meta, !!k.lowerIsBetter);

        const shell = document.createElement('div');
        shell.className = 'kr-shell';
        shell.innerHTML = `
          <div class="kr-head">
            <div>
              <div class="kr-name">${k.name}</div>
              <div class="kr-note">${k.note}</div>
            </div>
            <div class="subscore ${colorClass}">${Math.round(p)}<small>índice</small></div>
          </div>
          <div class="summary-grid">
            <div class="box">
              <div class="label">Meta</div>
              <div class="num">${fmt(k.meta)}</div>
            </div>
            <div class="box">
              <div class="label">Real</div>
              <div class="num">${fmt(k.actual)}</div>
            </div>
            <div class="box">
              <div class="label">Comparación</div>
              <div class="num">${k.comparison}</div>
            </div>
          </div>
          <details class="kr-details">
            <summary>
              <span>Ver detalle</span>
              <span class="summary-right">Componentes <span class="chev">⌄</span></span>
            </summary>
            <div class="details-body">
              <div class="component-grid">
                ${k.components.map(c => `
                  <div class="component-box">
                    <div class="label">${c.label}</div>
                    <div class="num">${c.value}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </details>
        `;
        body.appendChild(shell);
      });

      board.appendChild(objectiveCard);
    });

    sectionsWrap.appendChild(sec);
  });
}

function semanaISO(d=new Date()){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=date.getUTCDay()||7;
  date.setUTCDate(date.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

const hoy=new Date();
document.getElementById('fecha').textContent=`Información al ${hoy.toLocaleDateString('es-PE')} · Semana ${semanaISO(hoy)}`;

build();
</script>
</body>
</html>
