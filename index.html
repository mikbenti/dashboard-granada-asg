<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FFP Dashboard Financiero</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0b1220;color:#e5e7eb;font-family:Arial;margin:0;padding:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{background:#111827;padding:14px;border-radius:10px;border:1px solid #1f2937}
.label{font-size:12px;color:#94a3b8}
.value{font-size:26px;font-weight:bold}
.delta{font-size:12px;margin-top:6px}
.good{color:#22c55e}.bad{color:#ef4444}
</style>
</head>
<body>
<h2>FFP · Dashboard Financiero</h2>

<div class="grid" id="kpis"></div>

<script>
const data = {
 ventas:{a:58662361,p:46056299},
 roe:{a:6201675/50044922*100,p:7147964/45565908*100},
 roa:{a:13345544/128783337*100,p:11572556/106244751*100},
 roi:{a:13345544/128783337*100,p:11572556/106244751*100},
 ebitda:{a:16459915,p:14484072},
 margenEbitda:{a:16459915/58662361*100,p:14484072/46056299*100},
 costoVentas:{a:40145236,p:29726610},
 gastoVentas:{a:1813840,p:630104},
 gastoAdmin:{a:4604390,p:3934899},
 gastoFin:{a:4360007,p:2202839}
};

function delta(a,p){return ((a-p)/p*100)}
function fmt(n){return Math.round(n).toLocaleString()}
function pct(n){return n.toFixed(1)+"%"}

const map = [
 ['Ventas','ventas','$'],
 ['ROE','roe','%'],
 ['ROA','roa','%'],
 ['ROI','roi','%'],
 ['EBITDA','ebitda','$'],
 ['Margen EBITDA','margenEbitda','%'],
 ['Costo de ventas','costoVentas','$'],
 ['Gasto ventas','gastoVentas','$'],
 ['Gasto admin','gastoAdmin','$'],
 ['Gasto financiero','gastoFin','$']
];

const container=document.getElementById('kpis');

map.forEach(([name,key,type])=>{
 const a=data[key].a;
 const p=data[key].p;
 const d=delta(a,p);
 const cls=d>0?'good':'bad';
 const val= type=='%'?pct(a):'$'+fmt(a);
 const del= (d>0?'+':'')+pct(d);
 container.innerHTML+=`
 <div class="card">
  <div class="label">${name}</div>
  <div class="value">${val}</div>
  <div class="delta ${cls}">${del} vs 2024</div>
 </div>`;
});
</script>
</body>
</html>
