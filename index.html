<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14;
  --panel:#111827;
  --line:#1f2937;
  --text:#e5e7eb;
  --muted:#6b7280;
  --blue:#3b82f6;
  --green:#22c55e;
  --yellow:#facc15;
  --red:#ef4444;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Montserrat',sans-serif;
  padding:12px;
}

.container{max-width:1600px;margin:auto}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.title{
  font-size:16px;
  font-weight:700;
  letter-spacing:.05em;
}

.controls{
  display:flex;
  gap:8px;
}

select{
  background:#000;
  border:1px solid var(--line);
  color:var(--text);
  padding:6px 10px;
  font-size:12px;
}

/* GRID */
.board{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:8px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  padding:8px;
}

.panel-title{
  font-size:11px;
  color:var(--muted);
  margin-bottom:6px;
}

.kr{
  border-top:1px solid var(--line);
  padding-top:6px;
  margin-top:6px;
}

.kr-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.kr-name{
  font-size:12px;
  font-weight:700;
}

.score{
  font-size:11px;
  padding:2px 6px;
  border-radius:3px;
  font-weight:700;
}

.green{background:var(--green);color:#000}
.yellow{background:var(--yellow);color:#000}
.red{background:var(--red)}

.row{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  margin-top:3px;
}

.bar{
  height:4px;
  background:#000;
  margin-top:4px;
  position:relative;
}

.fill{
  height:100%;
  background:var(--blue);
}

</style>
</head>
<body>
<div class="container">

<div class="topbar">
  <div class="title">DASHBOARD OPERATIVO</div>
  <div class="controls">
    <select id="empresaSelect"></select>
    <select id="productoSelect"></select>
  </div>
</div>

<div id="board" class="board"></div>

</div>

<script>

const data = {
  ASG:{Granada:[{foco:'CALIDAD',krs:[{name:'IVC',actual:52,meta:60},{name:'ICP',actual:93,meta:95}]}]},
  FFP:{Arandano:[{foco:'EFICIENCIA',krs:[{name:'BREAKEVEN',actual:1.6,meta:1.4},{name:'ICP',actual:91,meta:95}]}]}
};

function populate(){
  const e=document.getElementById('empresaSelect');
  const p=document.getElementById('productoSelect');
  e.innerHTML=Object.keys(data).map(x=>`<option>${x}</option>`);
  e.onchange=()=>update();
  p.onchange=()=>build();
  update();
  function update(){
    p.innerHTML=Object.keys(data[e.value]).map(x=>`<option>${x}</option>`);
    build();
  }
}

function build(){
  const e=document.getElementById('empresaSelect').value;
  const p=document.getElementById('productoSelect').value;
  const board=document.getElementById('board');
  board.innerHTML='';

  data[e][p].forEach(o=>{
    const panel=document.createElement('div');
    panel.className='panel';
    panel.innerHTML=`<div class='panel-title'>${o.foco}</div>`;

    o.krs.forEach(k=>{
      const pct=Math.round((k.actual/k.meta)*100);
      const color=pct>=90?'green':pct>=70?'yellow':'red';

      panel.innerHTML+=`
      <div class='kr'>
        <div class='kr-head'>
          <div class='kr-name'>${k.name}</div>
          <div class='score ${color}'>${pct}%</div>
        </div>
        <div class='row'><span>Real</span><span>${k.actual}</span></div>
        <div class='row'><span>Meta</span><span>${k.meta}</span></div>
        <div class='bar'><div class='fill' style='width:${pct}%'></div></div>
      </div>`;
    });

    board.appendChild(panel);
  });
}

populate();

</script>
</body>
</html>
