<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Operativo</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0b0f14;
    --panel:#111827;
    --panel-2:#0f172a;
    --line:#1f2937;
    --text:#e5e7eb;
    --muted:#94a3b8;
    --blue:#3b82f6;
    --cyan:#22d3ee;
    --green:#22c55e;
    --yellow:#facc15;
    --red:#ef4444;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;padding:14px}
  .container{max-width:1680px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .brand-top{display:flex;align-items:center;gap:10px}
  .brand-top img{height:30px;width:auto;object-fit:contain}
  .title{font-size:18px;font-weight:800;letter-spacing:.04em}
  .subtitle{font-size:11px;color:var(--muted);margin-top:3px}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select,input[type=file]{background:#000;border:1px solid var(--line);color:var(--text);padding:8px 10px;font-size:12px;border-radius:6px;min-width:190px}
  .updated{font-size:11px;color:var(--muted)}
  .excel-meta{margin:0 0 10px 0;display:grid;gap:3px}
  .section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
  .section-brand{display:flex;align-items:center;gap:12px}
  .section-brand img.logo{height:56px;width:auto;object-fit:contain}
  .section-brand img.product{height:28px;width:auto;object-fit:contain}
  .section-brand .name{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .legend{display:flex;gap:6px;align-items:center}
  .legend-chip{width:20px;height:12px;border-radius:999px;display:inline-block}
  .green{background:var(--green);color:#000}
  .yellow{background:var(--yellow);color:#000}
  .red{background:var(--red);color:#fff}
  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:8px;margin-bottom:12px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .panel-head{background:var(--panel-2);border-bottom:1px solid var(--line);padding:8px 10px}
  .panel-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
  .panel-sub{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3}
  .panel-body{padding:8px}
  .kr{border-top:1px solid var(--line);padding-top:8px;margin-top:8px}
  .kr:first-child{border-top:none;padding-top:0;margin-top:0}
  .kr-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .kr-name{font-size:13px;font-weight:800}
  .kr-note{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.35}
  .score{font-size:12px;padding:4px 7px;border-radius:4px;font-weight:800;min-width:58px;text-align:center;border:1px solid rgba(255,255,255,.12)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
  .stat{background:#0b1220;border:1px solid var(--line);border-radius:6px;padding:6px}
  .stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .stat-value{font-size:11px;font-weight:800;margin-top:3px;line-height:1.25}
  .compare{display:flex;align-items:center;gap:5px}
  .delta-up{color:var(--green)}
  .delta-down{color:var(--red)}
  .delta-flat{color:var(--yellow)}
  .bar{height:4px;background:#000;border:1px solid var(--line);border-radius:999px;margin-top:6px;overflow:hidden}
  .fill{height:100%;background:var(--blue)}
  details.details{margin-top:6px}
  details.details summary{cursor:pointer;font-size:10px;color:var(--muted);list-style:none}
  details.details summary::-webkit-details-marker{display:none}
  .components{display:grid;gap:6px;margin-top:6px}
  .component{background:#0b1220;border:1px solid var(--line);border-radius:6px;padding:6px}
  .component-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
  .component-name{font-size:10px;font-weight:700;color:#cbd5e1;line-height:1.25}
  .component-score{font-size:10px;padding:3px 5px;border-radius:4px;font-weight:800;border:1px solid rgba(255,255,255,.12)}
  .component-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:5px}
  .component-mini{font-size:9px;color:var(--muted)}
  .component-mini b{display:block;color:var(--text);font-size:10px;margin-top:2px;line-height:1.25}
  .charts{display:grid;grid-template-columns:1fr;gap:8px}
  .chart-panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 10px 10px}
  .chart-head{display:flex;justify-content:space-between;align-items:end;gap:10px;margin-bottom:6px}
  .chart-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
  .chart-sub{font-size:10px;color:var(--muted)}
  .chart-wrap{height:220px}
  @media (max-width:900px){
    .stats,.component-stats{grid-template-columns:1fr}
    .chart-wrap{height:190px}
  }
</style>
</head>

let prodChart = null;
let arChart = null;
let calidadChart = null;
let uploadedProgramFFP = null;
let uploadedProgramASG = null;

function pickSheet(workbook, empresa, producto){
  const names = workbook.SheetNames || [];
  const normalize = s => String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const candidates = [];
  if (empresa === 'FFP' && producto === 'Arandano') candidates.push('ffp_arandano','ffp arandano','arandano','programa arandano','ffp');
  if (empresa === 'ASG' && producto === 'Granada') candidates.push('asg_granada','asg granada','granada','programa granada','asg');
  for (const candidate of candidates){
    const hit = names.find(name => normalize(name).includes(normalize(candidate)));
    if (hit) return { sheet: workbook.Sheets[hit], sheetName: hit };
  }
  return { sheet: workbook.Sheets[names[0]], sheetName: names[0] };
}

function parseProgramSheet(rows){
  const clean = rows.map(r => r.map(v => typeof v === 'string' ? v.trim() : v));
  const totalRow = clean.find(r => String(r[0] || '').toUpperCase() === 'TOTAL');
  if (!totalRow) throw new Error('No se encontró la fila TOTAL.');
  const weekRow = clean.find(r => r.filter(v => Number.isFinite(Number(v)) && Number(v) >= 1 && Number(v) <= 53).length >= 8);
  if (!weekRow) throw new Error('No se encontró la fila de semanas.');

  let startIdx = weekRow.findIndex(v => Number.isFinite(Number(v)) && Number(v) >= 1 && Number(v) <= 53);
  if (startIdx === -1) throw new Error('No se encontró el inicio de semanas.');
  let endIdx = startIdx;
  while (endIdx < weekRow.length && Number.isFinite(Number(weekRow[endIdx])) && Number(weekRow[endIdx]) >= 1 && Number(weekRow[endIdx]) <= 53) endIdx += 1;

  let labels = weekRow.slice(startIdx, endIdx).map(v => `W${Number(v)}`);
  let programado = totalRow.slice(startIdx, endIdx).map(v => {
    if (v === null || v === '' || v === '-') return 0;
    if (typeof v === 'string') return Number(v.replace(/,/g,'')) || 0;
    return Number(v) || 0;
  });

  const firstNonZeroIdx = programado.findIndex(v => v > 0);
  if (firstNonZeroIdx > 0) {
    labels = labels.slice(firstNonZeroIdx);
    programado = programado.slice(firstNonZeroIdx);
  }

  const programadoAc = [];
  programado.reduce((acc, val, idx) => {
    const next = acc + val;
    programadoAc[idx] = next;
    return next;
  }, 0);

  return { labels, programado, ejecutado:null, programadoAc, ejecutadoAc:null, totalProgramado: programadoAc[programadoAc.length - 1] || 0 };
}

function applyUploadedProgramToKRs(empresa, producto, parsed){
  const productData = data[empresa][producto];
  const totalKg = parsed.totalProgramado || 0;
  productData.objectives.forEach(obj => {
    obj.krs.forEach(kr => {
      if (String(kr.name).toLowerCase().includes('icp')) {
        kr.note = `Cumplimiento de producción con base en programa cargado (${Math.round(totalKg).toLocaleString('en-US')} kg programados).`;
      }
      if (String(kr.name).toLowerCase().includes('breakeven')) {
        kr.note = `Costo de equilibrio por kg. Programa base cargado: ${Math.round(totalKg).toLocaleString('en-US')} kg.`;
      }
    });
  });
}

function bindExcelLoader(inputId, statusId, metaId, sheetId, empresa, producto){
  const input = document.getElementById(inputId);
  if (!input || input.dataset.bound === '1') return;
  input.dataset.bound = '1';
  const status = document.getElementById(statusId);
  const meta = document.getElementById(metaId);
  const sheetInfo = document.getElementById(sheetId);
  const label = `${empresa} / ${producto}`;

  input.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type:'array' });
      const picked = pickSheet(workbook, empresa, producto);
      const rows = XLSX.utils.sheet_to_json(picked.sheet, { header:1, raw:true, defval:null });
      const parsed = parseProgramSheet(rows);
      if (empresa === 'FFP') uploadedProgramFFP = parsed;
      if (empresa === 'ASG') uploadedProgramASG = parsed;
      applyUploadedProgramToKRs(empresa, producto, parsed);
      status.textContent = `Programa cargado y aplicado a la curva y a los KR dependientes de volumen: ${label}.`;
      const uploadedAt = new Date(file.lastModified);
      meta.textContent = `Archivo: ${file.name} · Subido/última modificación: ${uploadedAt.toLocaleDateString('es-PE')} ${uploadedAt.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})}`;
      sheetInfo.textContent = `Hoja detectada: ${picked.sheetName}`;
      build();
    } catch (err) {
      if (empresa === 'FFP') uploadedProgramFFP = null;
      if (empresa === 'ASG') uploadedProgramASG = null;
      status.textContent = `No se pudo leer el archivo para ${label}. Revisa formato y hoja.`;
      meta.textContent = '';
      sheetInfo.textContent = '';
      console.error(err);
    }
  });
}

function setupExcelLoaders(){
  bindExcelLoader('excelFileFFP','excelStatusFFP','excelMetaFFP','excelSheetFFP','FFP','Arandano');
  bindExcelLoader('excelFileASG','excelStatusASG','excelMetaASG','excelSheetASG','ASG','Granada');
}

function progress(actual, meta, name, lowerIsBetter=false){
  if (typeof actual !== 'number' || typeof meta !== 'number') return 0;
  if (lowerIsBetter || String(name).toLowerCase().includes('breakeven')) return actual > 0 ? (meta / actual) * 100 : 0;
  return meta > 0 ? (actual / meta) * 100 : 0;
}

function band(name, actual, meta, lowerIsBetter=false){
  const n = String(name).toLowerCase();
  if (n.includes('icp')) {
    if (actual >= 95) return 'green';
    if (actual >= 90) return 'yellow';
    return 'red';
  }
  if (n.includes('ivc')) {
    const d = meta > 0 ? ((actual - meta) / meta) * 100 : 0;
    if (d >= -5) return 'green';
    if (d >= -10) return 'yellow';
    return 'red';
  }
  const p = progress(actual, meta, name, lowerIsBetter);
  if (p >= 90) return 'green';
  if (p >= 60) return 'yellow';
  return 'red';
}

function scoreClass(name, actual, meta, lowerIsBetter=false){
  return band(name, actual, meta, lowerIsBetter);
}

function fmt(v){
  if (typeof v === 'string') return v;
  return Number.isInteger(v) ? v.toString() : v.toFixed(2);
}

function componentIndex(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return '—';
  return Math.round(progress(c.actual, c.meta, c.label, !!c.lowerIsBetter)) + '%';
}

function componentProgressValue(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return null;
  return progress(c.actual, c.meta, c.label, !!c.lowerIsBetter);
}

function componentScoreClass(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return 'yellow';
  return scoreClass(c.label, c.actual, c.meta, !!c.lowerIsBetter);
}

function krComputedProgress(k){
  if (String(k.name).toLowerCase().includes('ivc')) {
    const vals = (k.components || []).map(componentProgressValue).filter(v => typeof v === 'number' && !Number.isNaN(v));
    if (vals.length) return vals.reduce((a,b)=>a+b,0) / vals.length;
  }
  const nums = (k.components || []).filter(c => typeof c.actual === 'number' && typeof c.meta === 'number');
  if (nums.length) {
    const vals = nums.map(componentProgressValue).filter(v => typeof v === 'number' && !Number.isNaN(v));
    if (vals.length) return vals.reduce((a,b)=>a+b,0) / vals.length;
  }
  return progress(k.actual, k.meta, k.name, !!k.lowerIsBetter);
}

function krComputedBand(k){
  if (String(k.name).toLowerCase().includes('ivc')) return band(k.name, k.actual, k.meta, !!k.lowerIsBetter);
  const nums = (k.components || []).filter(c => typeof c.actual === 'number' && typeof c.meta === 'number');
  if (nums.length) {
    const bands = nums.map(c => band(c.label, c.actual, c.meta, !!c.lowerIsBetter));
    if (bands.includes('red')) return 'red';
    if (bands.includes('yellow')) return 'yellow';
    return 'green';
  }
  return band(k.name, k.actual, k.meta, !!k.lowerIsBetter);
}

function deltaArrow(text=''){
  if (text.includes('+')) return '<span class="delta-up">↗</span>';
  if (text.includes('-')) return '<span class="delta-down">↘</span>';
  return '<span class="delta-flat">→</span>';
}

function chartOptions(){
  return {
    responsive:true,
    maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#cbd5e1',boxWidth:10,font:{size:10}}}},
    scales:{
      x:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'rgba(148,163,184,.08)'}},
      y:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'rgba(148,163,184,.08)'}}

  };
}

  if (prodChart) prodChart.destroy();
  if (arChart) arChart.destroy();
  if (calidadChart) calidadChart.destroy();

  const empresa = document.getElementById('empresaSelect').value;
  const producto = document.getElementById('productoSelect').value;
  const prodSeries = empresa === 'FFP' && producto === 'Arandano' && uploadedProgramFFP
    ? uploadedProgramFFP
    : empresa === 'ASG' && producto === 'Granada' && uploadedProgramASG
    ? uploadedProgramASG
    : series.produccion;

  document.getElementById('qualityTitle').textContent = series.calidad.titulo;
  document.getElementById('qualitySubtitle').textContent = series.calidad.subtitulo;

  prodChart = new Chart(document.getElementById('chartProduccion'), {
    type:'line',
    data:{
      labels: prodSeries.labels,
      datasets:[
        {label:'Programado', data:prodSeries.programado, borderColor:'#3b82f6', backgroundColor:'transparent', tension:.25},
        ...(prodSeries.ejecutado ? [{label:'Ejecutado', data:prodSeries.ejecutado, borderColor:'#22d3ee', backgroundColor:'transparent', tension:.25}] : []),
        {label:'Prog. acum.', data:prodSeries.programadoAc, borderColor:'#facc15', borderDash:[5,4], backgroundColor:'transparent', tension:.25},
        ...(prodSeries.ejecutadoAc ? [{label:'Ejec. acum.', data:prodSeries.ejecutadoAc, borderColor:'#22c55e', borderDash:[5,4], backgroundColor:'transparent', tension:.25}] : [])
      ]
    },
    options: chartOptions()
  });

  arChart = new Chart(document.getElementById('chartAR'), {
    type:'line',
    data:{
      labels: series.semanas,
      datasets:[
        {label:'AR semanal', data:series.ar.semanal, borderColor:'#22d3ee', backgroundColor:'transparent', tension:.25},
        {label:'AR acumulado', data:series.ar.acumulado, borderColor:'#22c55e', backgroundColor:'transparent', tension:.25}
      ]
    },
    options: chartOptions()
  });

  calidadChart = new Chart(document.getElementById('chartCalidad'), {
    type:'line',
    data:{
      labels: series.semanas,
      datasets:[
        {label:'Semanal', data:series.calidad.semanal, borderColor:'#facc15', backgroundColor:'transparent', tension:.25},
        {label:'Acumulado', data:series.calidad.acumulado, borderColor:'#ef4444', backgroundColor:'transparent', tension:.25}
      ]
    },
    options: chartOptions()
  });
}

function build(){
  const empresa = document.getElementById('empresaSelect').value;
  const producto = document.getElementById('productoSelect').value;
  const view = data[empresa][producto];
  const board = document.getElementById('board');
  const brand = document.getElementById('sectionBrand');
  board.innerHTML = '';

  brand.innerHTML = `
    <img class="logo" src="${view.brand.logo}" alt="${view.brand.name}" onerror="this.style.display='none'">
    <div class="name">${view.brand.name}</div>
    <img class="product" src="${view.brand.productImg}" alt="${producto}" onerror="this.style.display='none'">
  `;

  view.objectives.forEach(o => {
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = `<div class="panel-head"><div class="panel-title">${o.foco}</div><div class="panel-sub">${o.objetivo}</div></div><div class="panel-body"></div>`;
    const body = panel.querySelector('.panel-body');

    o.krs.forEach(k => {
      const pct = Math.round(krComputedProgress(k));
      const color = krComputedBand(k);
      const barWidth = Math.max(6, Math.min(100, pct));
      const kr = document.createElement('div');
      kr.className = 'kr';
      kr.innerHTML = `
        <div class="kr-head">
          <div>
            <div class="kr-name">${k.name}</div>
            <div class="kr-note">${k.note}</div>
          </div>
          <div class="score ${color}">${pct}%</div>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-label">Meta</div><div class="stat-value">${k.name.toLowerCase().includes('icp') ? '≥95%' : fmt(k.meta)}</div></div>
          <div class="stat"><div class="stat-label">Real</div><div class="stat-value">${fmt(k.actual)}${k.name.toLowerCase().includes('icp') ? '%' : ''}</div></div>
          <div class="stat"><div class="stat-label">Comparación</div><div class="stat-value compare">${deltaArrow(k.comparison)}<span>${k.comparison}</span></div></div>
        </div>
        <div class="bar"><div class="fill" style="width:${barWidth}%"></div></div>
        <details class="details">
          <summary>Ver detalle</summary>
          <div class="components">
            ${k.components.map(c => {
              const cp = componentProgressValue(c);
              const cWidth = typeof cp === 'number' ? Math.max(6, Math.min(100, Math.round(cp))) : 50;
              return `
                <div class="component">
                  <div class="component-top">
                    <div class="component-name">${c.label}</div>
                    <div class="component-score ${componentScoreClass(c)}">${componentIndex(c)}</div>
                  </div>
                  <div class="component-stats">
                    <div class="component-mini">Meta<b>${fmt(c.meta ?? '—')}${c.isICP ? '%' : ''}</b></div>
                    <div class="component-mini">Real<b>${fmt(c.actual ?? '—')}${c.isICP ? '%' : ''}</b></div>
                    <div class="component-mini">Comp.<b>${c.comparison ?? '—'}</b></div>
                  </div>
                  <div class="bar"><div class="fill" style="width:${cWidth}%"></div></div>
                </div>`;
            }).join('')}
          </div>
        </details>
      `;
      body.appendChild(kr);
    });

    board.appendChild(panel);
  });

  renderCharts(view.series);
}

function populateSelectors(){
  setupExcelLoaders();
  const empresaSel = document.getElementById('empresaSelect');
  const productoSel = document.getElementById('productoSelect');
  empresaSel.innerHTML = Object.keys(data).map(v => `<option value="${v}">${v}</option>`).join('');
  function updateProductos(){
    const empresa = empresaSel.value;
    productoSel.innerHTML = Object.keys(data[empresa]).map(v => `<option value="${v}">${v}</option>`).join('');
    build();
  }
  empresaSel.addEventListener('change', updateProductos);
  productoSel.addEventListener('change', build);
  updateProductos();
}

function semanaISO(d=new Date()){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

document.getElementById('updatedAt').textContent = `${new Date().toLocaleDateString('es-PE')} | Semana ${semanaISO(new Date())}`;
document.getElementById('excelStatusFFP').textContent = 'Opcional: carga el Excel del programa de FFP / Arándano. Se usará para la curva y como base de volumen programado.';
document.getElementById('excelMetaFFP').textContent = '';
document.getElementById('excelSheetFFP').textContent = '';
document.getElementById('excelStatusASG').textContent = 'Opcional: carga el Excel del programa de ASG / Granada. Se usará para la curva y como base de volumen programado.';
document.getElementById('excelMetaASG').textContent = '';
document.getElementById('excelSheetASG').textContent = '';
populateSelectors();
</script>
