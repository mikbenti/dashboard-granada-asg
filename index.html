<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V&P · Dashboard Indicadores Estratégicos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3ef;
    --panel:#f8fbf9;
    --card:#ffffff;
    --ink:#0f3f35;
    --ink-2:#1a5a4b;
    --muted:#6c8078;
    --line:#d5e0db;
    --accent:#0d614c;
    --accent-2:#16a085;
    --shadow:0 10px 26px rgba(10,50,35,.08);
    --green:#57ff1f;
    --green-line:#1f5e10;
    --yellow:#fff200;
    --yellow-line:#a67c00;
    --red:#ff3b30;
    --red-line:#7a0f14;
    --blue:#29b6f6;
  }

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:'Montserrat', Arial, sans-serif;
    background:radial-gradient(circle at top left, #f7fcf8 0%, var(--bg) 45%, #e9f0ec 100%);
    color:var(--ink);
    padding:18px;
  }
  .container{max-width:1720px;margin:auto}

  .hero{
    position:relative;
    background:linear-gradient(135deg, rgba(255,255,255,.88), rgba(247,252,249,.96));
    border:1px solid var(--line);
    border-radius:26px;
    padding:18px 18px 14px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .hero::after{
    content:'';
    position:absolute;
    inset:auto -90px -90px auto;
    width:230px;
    height:230px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(22,160,133,.12), rgba(22,160,133,0));
    pointer-events:none;
  }
  .hero-top{
    display:grid;
    grid-template-columns:170px 1fr 240px;
    gap:14px;
    align-items:center;
  }
  .logo-wrap{display:flex;align-items:center;justify-content:flex-start;height:100%}
  .logo-wrap > img{width:118px;height:118px;object-fit:contain;filter: brightness(0) saturate(100%) invert(28%) sepia(34%) saturate(852%) hue-rotate(124deg) brightness(90%) contrast(92%)}
  .title-wrap{text-align:center}
  .eyebrow{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);font-weight:700}
  h1{margin:6px 0 0;font-size:34px;line-height:1;letter-spacing:-0.03em;color:var(--ink);font-weight:900;text-transform:uppercase}
  .subtitle{margin-top:8px;font-size:13px;color:var(--muted);font-weight:500}
  .meta-wrap{display:flex;justify-content:flex-end}
  .tag{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:center;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:16px;
    background:linear-gradient(180deg,#fff,#f6faf8);
    box-shadow:0 6px 18px rgba(10,50,35,.06);
    min-width:220px;
  }
  .tag-label{font-size:12px;font-weight:500;color:var(--muted);line-height:1.1}
  .tag-date{font-size:15px;font-weight:800;color:var(--ink);line-height:1.2;margin-top:6px}
  .legend{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:10px}
  .legend-chip{width:28px;height:18px;border-radius:999px;display:inline-block}

  .controls{
    display:grid;
    grid-template-columns:240px 240px 1fr;
    gap:10px;
    margin:0 0 14px;
  }
  .controls select{
    appearance:none;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:14px;
    background:linear-gradient(180deg,#fff,#f6faf8);
    color:var(--ink);
    font:700 13px 'Montserrat',sans-serif;
    box-shadow:0 6px 14px rgba(10,50,35,.05);
  }
  .view-pill{
    justify-self:end;
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:14px;
    background:linear-gradient(180deg,#fff,#f6faf8);
    color:var(--muted);
    font-size:12px;
    font-weight:700;
  }
  .pulse-dot{width:9px;height:9px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 0 rgba(22,160,133,.45);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,160,133,.4)}70%{box-shadow:0 0 0 10px rgba(22,160,133,0)}100%{box-shadow:0 0 0 0 rgba(22,160,133,0)}}

  .score-green{color:#103f0d;background:var(--green);border:2px solid var(--green-line)}
  .score-yellow{color:#7a5a00;background:var(--yellow);border:2px solid var(--yellow-line)}
  .score-red{color:#5a0b0f;background:var(--red);border:2px solid var(--red-line)}

  .dashboard-section{margin-bottom:16px}
  .section-banner{
    max-width:420px;
    min-height:72px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    margin-bottom:12px;
    padding:10px 16px;
    border:1px solid var(--line);
    border-radius:18px;
    background:linear-gradient(135deg,#ffffff,#f5faf7);
    box-shadow:var(--shadow);
  }
  .section-left{display:flex;align-items:center;gap:16px;min-width:0}
  .section-left img{height:84px;width:auto;object-fit:contain}
  .section-left img.blueberry-icon{height:84px;width:auto;transform:scale(1.8);transform-origin:left center}
  .section-title{font-size:0;line-height:0}
  .section-product{display:flex;align-items:center;justify-content:center;height:100%;flex:0 0 auto}
  .section-product img{height:48px;width:auto;object-fit:contain}

  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;align-items:start}
  .objective-card{
    background:linear-gradient(180deg,#ffffff,#fbfdfc);
    border:1px solid var(--line);
    border-radius:22px;
    overflow:hidden;
    box-shadow:var(--shadow);
    height:100%;
  }
  .objective-header{
    background:linear-gradient(135deg,var(--header),#0b5644 55%, #0c4b3d 100%);
    color:#fff;
    padding:14px 14px 12px;
    min-height:122px;
    position:relative;
    overflow:hidden;
  }
  .objective-header::after{
    content:'';
    position:absolute;
    right:-30px;
    top:-30px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.16), rgba(255,255,255,0));
  }
  .focus{font-size:20px;letter-spacing:.08em;text-transform:uppercase;opacity:.98;font-weight:900;text-align:center;display:block}
  .objective-title{font-size:17px;font-weight:700;text-transform:uppercase;line-height:1.15;letter-spacing:0.03em;margin-top:8px;color:#fff;text-align:center}
  .objective-sub{margin-top:10px;font-size:10px;opacity:.9;line-height:1.4;font-weight:400;text-align:center}

  .objective-body{padding:12px;background:linear-gradient(180deg,#fff,#fbfdfc)}
  .kr-shell{background:linear-gradient(180deg,#f9fbfa,#f4f8f6);border:1px solid #dde7e2;border-radius:16px;padding:12px;margin-bottom:10px}
  .kr-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
  .kr-name{font-size:20px;font-weight:900;line-height:1;color:var(--ink);letter-spacing:-0.02em}
  .kr-note{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.35;font-weight:500;max-width:90%}
  .subscore,.component-score{text-align:center;line-height:1;border-radius:14px;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.35)}
  .subscore{min-width:86px;padding:10px 9px;font-size:22px;animation:floaty 3.2s ease-in-out infinite}
  .component-score{min-width:50px;padding:5px 6px;border-radius:10px;font-size:13px}
  .subscore small,.component-score small{display:block;text-transform:uppercase;font-weight:800}
  .subscore small{font-size:9px;letter-spacing:.10em;margin-top:5px}
  .component-score small{font-size:7px;letter-spacing:.06em;margin-top:3px}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}

  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
  .box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 10px 9px;position:relative;overflow:hidden}
  .box::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent-2),rgba(22,160,133,.1))}
  .box .label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
  .box .num{font-size:16px;font-weight:900;color:var(--ink);margin-top:4px}
  .compare-box .num{display:flex;align-items:center;gap:6px}
  .delta-up,.delta-down,.delta-flat{display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
  .delta-up{color:#178f3c;animation:wiggleUp 1.4s ease-in-out infinite}
  .delta-down{color:#c62828;animation:wiggleDown 1.4s ease-in-out infinite}
  .delta-flat{color:#8a7a00}
  @keyframes wiggleUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
  @keyframes wiggleDown{0%,100%{transform:translateY(0)}50%{transform:translateY(2px)}}

  details.kr-details{margin-top:8px}
  details.kr-details summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#ffffff;font-weight:800;color:var(--ink);font-size:12px}
  details.kr-details summary::-webkit-details-marker{display:none}
  .summary-right{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;font-weight:700}
  .chev{transition:transform .2s ease}
  details[open] .chev{transform:rotate(180deg)}
  .details-body{padding-top:8px}

  .component-grid{display:grid;grid-template-columns:1fr;gap:8px}
  .component-row{background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 10px}
  .component-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .component-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:800;line-height:1.25}
  .component-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
  .component-mini{background:#f7faf8;border:1px solid var(--line);border-radius:8px;padding:6px 7px}
  .component-mini .mini-label{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:800}
  .component-mini .mini-num{font-size:12px;font-weight:800;color:var(--ink);margin-top:3px}
  .progress-track{height:7px;background:#e8f0ec;border-radius:999px;overflow:hidden;margin-top:8px;border:1px solid #dce7e1}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent-2));border-radius:999px;transition:width .5s ease}

  @media (max-width:1200px){
    .hero-top{grid-template-columns:1fr;text-align:center}
    .logo-wrap,.meta-wrap{justify-content:center;align-items:center}
    .legend{justify-content:center}
    .tag{align-items:center}
    .controls{grid-template-columns:1fr 1fr}
    .view-pill{grid-column:1 / -1;justify-self:stretch;justify-content:center}
  }
  @media (max-width:700px){
    h1{font-size:30px}
    .objective-title{font-size:16px}
    .kr-name{font-size:17px}
    .summary-grid,.component-metrics,.controls{grid-template-columns:1fr}
    .section-left img.blueberry-icon{transform:scale(1.3)}
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-top">
      <div class="logo-wrap"><img src="logo-okrs.png" alt="Cultivamos futuro"></div>
      <div class="title-wrap">
        <div class="eyebrow">Valle y Pampa · 2026</div>
        <h1>Dashboard Indicadores Estratégicos</h1>
        <div class="subtitle">Monitoreo de objetivos y resultados clave</div>
      </div>
      <div class="meta-wrap">
        <div class="tag">
          <div class="tag-label">Ultima Actualización</div>
          <div class="tag-date" id="fecha"></div>
        </div>
      </div>
    </div>
    <div class="legend">
      <span class="legend-chip score-green"></span>
      <span class="legend-chip score-yellow"></span>
      <span class="legend-chip score-red"></span>
    </div>
  </div>

  <div class="controls">
    <select id="empresaSelect"></select>
    <select id="productoSelect"></select>
    <div class="view-pill"><span class="pulse-dot"></span> Vista comprimida · dinámica</div>
  </div>

  <div id="sections"></div>
</div>

<script>
const data = {
  ASG: {

        iconClass:'',
        subtitle:'granada',

                ],

              }
            ]
          },
          {

            krs:[
              {
                name:'IP',
                note:'Índice de productividad en ASG.',
                actual:76,
                meta:100,
                components:[
                  {label:'% Kg por CAR', actual:82, meta:90, comparison:'-8 pts'},
                  {label:'Costo persona', actual:0.93, meta:1.00, comparison:'-0.07', lowerIsBetter:true}
                ],
                comparison:'76 | -24%'
              }
            ]
          }
        ]
      }
    ]
  },
  FFP: {
    Arandano: [
      {
        title:'Family Farms Perú (FFP)',
        icon:'logo-family.png',
        iconClass:'blueberry-icon',
        subtitle:'arándano',
        objectives:[
          {
            foco:'CALIDAD',
            objetivo:'Maximizar la captura de valor de la producción',
            descripcion:'Captura de valor comercial entregada al mercado.',
            krs:[
              {
                name:'IVC',
                note:'Índice de valor comercializable para arándanos.',
                actual:35.95,
                meta:41.65,
                components:[
                  {label:'% Exportable', actual:84, meta:85, comparison:'-1.0 pp'},
                  {label:'% JBO s/total producido', actual:48, meta:30, comparison:'+18.0 pp'},
                  {label:'% Arribos ≥ 4', actual:89, meta:70, comparison:'+19.0 pp'}
                ],
                comparison:'-5.70 | -13.7%'
              }
            ]
          },
          {
            foco:'EFICIENCIA',
            objetivo:'Maximizar la eficiencia integral del negocio',
            descripcion:'Eficiencia productiva y cumplimiento de producción.',
            krs:[
              {
                name:'Breakeven/kg',
                note:'Costo de equilibrio por kg en FFP.',
                actual:1.62,
                meta:1.45,
                lowerIsBetter:true,
                components:[
                  {label:'Egresos P&L', actual:'US$ 16.2MM', meta:'US$ 15.6MM', comparison:'+0.6MM'},
                  {label:'Kg producidos', actual:'9.95MM', meta:'10.93MM', comparison:'-0.98MM'},
                  {label:'Breakeven', actual:1.62, meta:1.45, comparison:'+0.17', lowerIsBetter:true}
                ],
                comparison:'1.62 | +12%'
              },
              {
                name:'ICP',

                meta:95,

          },
          {

              {
                name:'IP',
                note:'Índice de productividad en FFP.',
                actual:81,
                meta:100,
                components:[
                  {label:'% Kg por CAR', actual:86, meta:92, comparison:'-6 pts'},
                  {label:'Costo persona', actual:0.94, meta:1.00, comparison:'-0.06', lowerIsBetter:true}

          }
        ]
      }

};

function populateSelectors(){
  const empresaSel = document.getElementById('empresaSelect');
  const productoSel = document.getElementById('productoSelect');
  empresaSel.innerHTML = Object.keys(data).map(e => `<option value="${e}">${e}</option>`).join('');
  function updateProductos(){
    const empresa = empresaSel.value;
    productoSel.innerHTML = Object.keys(data[empresa]).map(p => `<option value="${p}">${p}</option>`).join('');
    build();
  }
  empresaSel.addEventListener('change', updateProductos);
  productoSel.addEventListener('change', build);
  updateProductos();
}

function progress(actual, meta, name, lowerIsBetter=false){
  if (typeof actual !== 'number' || typeof meta !== 'number') return 0;
  if (lowerIsBetter || String(name).toLowerCase().includes('breakeven')) return actual > 0 ? (meta / actual) * 100 : 0;
  return meta > 0 ? (actual / meta) * 100 : 0;
}
function band(name, actual, meta, lowerIsBetter=false){
  const n = String(name).toLowerCase();
  if (n.includes('icp')) {
    if (actual >= 95) return 'green';
    if (actual >= 90) return 'yellow';
    return 'red';
  }
  if (n.includes('ivc')) {
    const deviationPct = meta > 0 ? ((actual - meta) / meta) * 100 : 0;
    if (deviationPct >= -5) return 'green';
    if (deviationPct >= -10) return 'yellow';
    return 'red';
  }
  const p = progress(actual, meta, name, lowerIsBetter);
  if (p >= 90) return 'green';
  if (p >= 60) return 'yellow';
  return 'red';
}
function scoreClass(name, actual, meta, lowerIsBetter=false){
  const b = band(name, actual, meta, lowerIsBetter);
  return b === 'green' ? 'score-green' : b === 'yellow' ? 'score-yellow' : 'score-red';
}
function fmt(v){
  if (typeof v === 'string') return v;
  return Number.isInteger(v) ? v.toString() : v.toFixed(2);
}
function componentIndex(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return '—';
  return Math.round(progress(c.actual, c.meta, c.label, !!c.lowerIsBetter)) + '%';
}
function componentBandValue(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return 'yellow';
  return band(c.label, c.actual, c.meta, !!c.lowerIsBetter);
}
function componentScoreClass(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return 'score-yellow';
  return scoreClass(c.label, c.actual, c.meta, !!c.lowerIsBetter);
}
function componentProgressValue(c){
  if (typeof c.actual !== 'number' || typeof c.meta !== 'number') return null;
  return progress(c.actual, c.meta, c.label, !!c.lowerIsBetter);
}
function krComputedProgress(k){
  if (String(k.name).toLowerCase().includes('ivc')) {
    const vals = (k.components || []).map(componentProgressValue).filter(v => typeof v === 'number' && !Number.isNaN(v));
    if (vals.length) return vals.reduce((a,b)=>a+b,0) / vals.length;
  }
  const numericComponents = (k.components || []).filter(c => typeof c.actual === 'number' && typeof c.meta === 'number');
  if (numericComponents.length > 0) {
    const vals = numericComponents.map(componentProgressValue).filter(v => typeof v === 'number' && !Number.isNaN(v));
    if (vals.length > 0) return vals.reduce((a,b)=>a+b,0) / vals.length;
  }
  return progress(k.actual, k.meta, k.name, !!k.lowerIsBetter);
}
function krComputedBand(k){
  if (String(k.name).toLowerCase().includes('ivc')) return band(k.name, k.actual, k.meta, !!k.lowerIsBetter);
  const numericComponents = (k.components || []).filter(c => typeof c.actual === 'number' && typeof c.meta === 'number');
  if (numericComponents.length > 0) {
    const bands = numericComponents.map(componentBandValue);
    if (bands.includes('red')) return 'red';
    if (bands.includes('yellow')) return 'yellow';
    return 'green';
  }
  return band(k.name, k.actual, k.meta, !!k.lowerIsBetter);
}
function krComputedScoreClass(k){
  const b = krComputedBand(k);
  return b === 'green' ? 'score-green' : b === 'yellow' ? 'score-yellow' : 'score-red';
}
function deltaArrow(text=''){
  if (text.includes('+')) return '<span class="delta-up">↗</span>';
  if (text.includes('-')) return '<span class="delta-down">↘</span>';
  return '<span class="delta-flat">→</span>';
}

function build(){
  const empresa = document.getElementById('empresaSelect').value;
  const producto = document.getElementById('productoSelect').value;
  const sections = data[empresa][producto];
  const sectionsWrap = document.getElementById('sections');
  sectionsWrap.innerHTML = '';

  sections.forEach(section => {
    const fruitImg = section.subtitle ? `<img src="${section.subtitle === 'granada' ? 'granada.png' : 'arandano.png'}" style="height:72px;width:auto;object-fit:contain;"/>` : '';
    const sec = document.createElement('div');
    sec.className = 'dashboard-section';
    sec.innerHTML = `
      <div class="section-banner">
        <div class="section-left">
          <img class="${section.iconClass}" src="${section.icon}" alt="${section.title}" />
          <div><div class="section-title">${section.title}</div></div>
        </div>
        <div class="section-product">${fruitImg}</div>
      </div>
      <div class="board"></div>
    `;
    const board = sec.querySelector('.board');

    section.objectives.forEach(o => {
      const objectiveCard=document.createElement('div');
      objectiveCard.className='objective-card';
      objectiveCard.innerHTML=`
        <div class="objective-header">
          <div class="focus">${o.foco}</div>
          <div class="objective-title">${o.objetivo}</div>
          <div class="objective-sub">${o.descripcion}</div>
        </div>
        <div class="objective-body"></div>
      `;
      const body = objectiveCard.querySelector('.objective-body');

      o.krs.forEach(k => {
        const p = krComputedProgress(k);
        const colorClass = krComputedScoreClass(k);
        const barWidth = Math.max(8, Math.min(100, Math.round(p)));
        const shell = document.createElement('div');
        shell.className = 'kr-shell';
        shell.innerHTML = `
          <div class="kr-head">
            <div>
              <div class="kr-name">${k.name}</div>
              <div class="kr-note">${k.note}</div>
            </div>
            <div class="subscore ${colorClass}">${Math.round(p)}%<small>cumpl.</small></div>
          </div>
          <div class="summary-grid">
            <div class="box">
              <div class="label">Meta</div>
              <div class="num">${k.name.toLowerCase().includes('icp') ? '≥95%' : fmt(k.meta)}</div>
            </div>
            <div class="box">
              <div class="label">Real</div>
              <div class="num">${fmt(k.actual)}${k.name.toLowerCase().includes('icp') ? '%' : ''}</div>
            </div>
            <div class="box compare-box">
              <div class="label">Comparación</div>
              <div class="num">${deltaArrow(k.comparison)}<span>${k.comparison}</span></div>
            </div>
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${barWidth}%;"></div></div>
          <details class="kr-details">
            <summary>
              <span>Ver detalle</span>
              <span class="summary-right">Componentes <span class="chev">⌄</span></span>
            </summary>
            <div class="details-body">
              <div class="component-grid">
                ${k.components.map(c => {
                  const cp = componentProgressValue(c);
                  const cWidth = typeof cp === 'number' ? Math.max(8, Math.min(100, Math.round(cp))) : 50;
                  return `
                  <div class="component-row">
                    <div class="component-top">
                      <div class="component-title">${c.label}</div>
                      <div class="component-score ${componentScoreClass(c)}">${componentIndex(c)}<small>cumpl.</small></div>
                    </div>
                    <div class="component-metrics">
                      <div class="component-mini">
                        <div class="mini-label">Meta</div>
                        <div class="mini-num">${fmt(c.meta ?? '—')}${c.isICP ? '%' : ''}</div>
                      </div>
                      <div class="component-mini">
                        <div class="mini-label">Real</div>
                        <div class="mini-num">${fmt(c.actual ?? '—')}${c.isICP ? '%' : ''}</div>
                      </div>
                      <div class="component-mini">
                        <div class="mini-label">Comparación</div>
                        <div class="mini-num">${c.comparison ?? '—'}</div>
                      </div>
                    </div>
                    <div class="progress-track"><div class="progress-fill" style="width:${cWidth}%;"></div></div>
                  </div>`;
                }).join('')}
              </div>
            </div>
          </details>
        `;
        body.appendChild(shell);
      });
      board.appendChild(objectiveCard);
    });
    sectionsWrap.appendChild(sec);
  });
}

function semanaISO(d=new Date()){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=date.getUTCDay()||7;
  date.setUTCDate(date.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

const hoy = new Date();
document.getElementById('fecha').textContent = `${hoy.toLocaleDateString('es-PE')} | Semana ${semanaISO(hoy)}`;
populateSelectors();
</script>
</body>
