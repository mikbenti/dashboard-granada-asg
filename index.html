<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V&P · OKRs</title>
<style>
body{background:#f4f7fb;color:#1e293b;font-family:Arial;margin:0;padding:20px}
.container{max-width:1600px;margin:auto}
.okr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;align-items:start}
.header{margin-bottom:20px}
h1{margin:0}
.tag{display:inline-block;padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;margin-top:8px;background:white}
.okr{background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;height:100%}
.okr-head{display:flex;justify-content:space-between;align-items:center}
.kr{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-top:10px}
.staackground:#22c55e}
.warn .dot{background:#facc15}
.bad .dot{background:#ef4444}
.meta{display:flex;gap:10px;margin-top:8px}
.box{background:#ffffff;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:12px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="tag" id="lastUpdate"></div>
<div class="tag" id="dataDate"></div>
<h1>OKRs 2026</h1>
<div class="tag" id="fecha"></div>
</div>
<div id="okrs"></div>
</div>
<script>
const data=[
{foco:'CALIDAD',objetivo:'Maximizar captura d<div id="okrs" class="okr-grid"></div>85,formula:'IVC = exportable x calidad x arribos'}
]},
{foco:'EFICIENCIA',objetivo:'Maximizar eficiencia integral',krs:[
{name:'Breakeven/kg',actual:1.62,meta:1.45,formula:'egresos/kg'},
{name:'ICP',actual:91,meta:95,formula:'producido/programado'}
]},
{foco:'TALENTO',objetivo:'Maximizar productividad personas',krs:[
{name:'IP',actual:78,meta:100,formula:'productividad x costo'}
]},
{foco:'CRECIMIENTO',objetivo:'Maximizar nuevos flujos',krs:[
{name:'INF',actual:9,meta:15,formula:'contribución nueva/total'}
]}
];

function progress(a,m,name){
 if(name.toLowerCase().includes('breakeven')) return (m/a)*100;
 return (a/m)*100;
}
function status(p){
 if(p>=90)return'good';
 if(p>=60)return'warn';
 return'bad';
}

function build(){
 const container=document.getElementById('okrs');
 container.innerHTML='';
 data.forEach(o=>{
   let worst=100;
   o.krs.forEach(k=>{
     const p=progress(k.actual,k.meta,k.name);
     if(p<worst)worst=p;
   });
   const oStatus=status(worst);
   const oDiv=document.createElement('div');
   oDiv.className='okr';
   oDiv.innerHTML=`
     <div class="okr-head">
       <div>
         <div style="font-size:12px;color:#64748b">${o.foco}</div>
         <div style="font-size:18px;font-weight:bold">${o.objetivo}</div>
       </div>
       <div class="status ${oStatus}"><div class="dot"></div></div>
     </div>
   `;

   o.krs.forEach(k=>{
     const p=progress(k.actual,k.meta,k.name);
     const s=status(p);
     const kr=document.createElement('div');
     kr.className='kr';
     kr.innerHTML=`
       <div style="font-weight:bold">${k.name}</div>
       <div class="meta">
         <div class="box">Actual: ${k.actual}</div>
         <div class="box">Meta: ${k.meta}</div>
         <div class="box">Avance: ${p.toFixed(1)}%</div>
       </div>
       <div class="status ${s}" style="margin-top:8px"><div class="dot"></div></div>
       <div style="font-size:11px;color:#64748b;margin-top:6px">${k.formula}</div>
     `;
     oDiv.appendChild(kr);
   });

   container.appendChild(oDiv);
 });
}

function semanaISO(d=new Date()){
 const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
 const dayNum=date.getUTCDay()||7;
 date.setUTCDate(date.getUTCDate()+4-dayNum);
 const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
 const week=Math.ceil((((date-yearStart)/86400000)+1)/7);
 return week;
}

const hoy=new Date();

// última actualización (momento de carga)
document.getElementById('lastUpdate').textContent=`Actualizado: ${hoy.toLocaleString('es-PE')}`;

// fecha de la información (editable luego desde inputs)
const dataDate = new Date(); // esto luego vendrá del Excel

document.getElementById('dataDate').textContent=`Información al: ${dataDate.toLocaleDateString('es-PE')}`;
document.getElementById('fecha').textContent=`${hoy.toLocaleDateString('es-PE')} · Semana ${semanaISO(hoy)}`;

build();
</script>
</body>
</html>
